<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mossarun 24h</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=Inconsolata:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  /* ── Base palette ── */
  --bg:       #07201a;
  --bg2:      #0c2a22;
  --bg3:      #11342a;
  --card:     #0f2e25;
  --card2:    #142f27;
  --border:   rgba(120,200,160,0.13);
  --border2:  rgba(120,200,160,0.22);

  /* ── Text ── */
  --cream:    #edf2ee;
  --cream2:   #c4d0c8;
  --cream3:   #8fa899;
  --dim:      #6d8878;

  /* ── Amber accent ── */
  --amber:    #c8903a;
  --amber2:   #b07a28;
  --amber-lt: #e0a84a;
  --amber-txt:#dfa040;

  /* ── Category colours — solid opaque backgrounds, vivid fg, max differentiation ── */
  /* Easy       -> teal-green solid */
  --c-easy-bg:   #1a5c3a; --c-easy-fg:  #a0ffc8;
  /* Long       -> deep navy solid */
  --c-long-bg:   #1a3a70; --c-long-fg:  #90d0ff;
  /* Strength   -> warm brick red */
  --c-str-bg:    #6a1e0a; --c-str-fg:   #ffb090;
  /* Tempo      -> deep gold */
  --c-tempo-bg:  #5a3500; --c-tempo-fg: #ffd060;
  /* Intervals  -> vivid lime on dark */
  --c-int-bg:    #0a3a10; --c-int-fg:   #78ff50;
  /* Incline    -> rich purple */
  --c-inc-bg:    #38186a; --c-inc-fg:   #ddb8ff;
  /* Night sim  -> dark navy, ice blue text */
  --c-night-bg:  #0a2248; --c-night-fg: #80d8ff;
  /* Back-to-back -> deep magenta */
  --c-back-bg:   #5a0a40; --c-back-fg:  #ffaaee;
  /* Race       -> solid amber reversed */
  --c-race-bg:   #c8903a; --c-race-fg:  #07201a;
  /* Nutrition  -> olive solid */
  --c-nut-bg:    #384a00; --c-nut-fg:   #d8f060;
  /* Rest       -> flat grey-teal */
  --c-rest-bg:   #243028; --c-rest-fg:  #88a898;

  --r:10px; --r2:14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.45), 0 1px 4px rgba(0,0,0,0.3);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.35);
  --display:'Barlow Condensed',sans-serif;
  --body:'Barlow',sans-serif;
  --mono:'Inconsolata',monospace;
}

/* ── DOT GRID BACKGROUND ─────────────────────────────── */
html{-webkit-text-size-adjust:100%;background:var(--bg);}
body{
  font-family:var(--body);
  color:var(--cream);
  font-size:16px;
  line-height:1.5;
  min-height:100vh;
  background-color:var(--bg);
  background-image:
    radial-gradient(circle at 20% 0%, rgba(60,160,110,0.08) 0%, transparent 55%),
    radial-gradient(circle at 80% 100%, rgba(30,100,70,0.06) 0%, transparent 50%),
    radial-gradient(rgba(100,180,130,0.18) 1px, transparent 1px);
  background-size:auto, auto, 22px 22px;
  background-attachment: fixed, fixed, fixed;
}

/* ── HERO ─────────────────────────────────────────────── */
.hero{
  background: rgba(10,30,24,0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom:1px solid var(--border2);
  position:sticky;top:0;z-index:100;
  box-shadow: 0 4px 32px rgba(0,0,0,0.5);
}
.hero-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;}
.hero-eyebrow{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--amber-txt);}
.hero-date{font-family:var(--mono);font-size:11px;color:var(--dim);}
.hero-body{padding:0 16px 16px;}
.hero-pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.hero-week-badge{font-family:var(--mono);font-size:11px;color:var(--cream3);background:rgba(255,255,255,0.05);border:1px solid var(--border2);padding:3px 9px;border-radius:20px;letter-spacing:0.04em;}
.hero-title{font-family:var(--display);font-size:30px;font-weight:900;letter-spacing:0.01em;line-height:1.05;color:var(--cream);text-transform:uppercase;margin-bottom:8px;}
.hero-desc{font-size:14px;color:var(--cream2);line-height:1.6;}
.hero-actions{display:flex;gap:8px;margin-top:14px;}
.btn-done{
  flex:1;background:var(--amber);color:#fff;border:none;
  border-radius:var(--r);padding:14px 16px;
  font-family:var(--display);font-size:20px;font-weight:800;
  letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;
  transition:background 0.12s,transform 0.08s;
  box-shadow: 0 4px 16px rgba(200,144,58,0.35);
}
.btn-done:active{background:var(--amber2);transform:scale(0.97);}
.btn-done.is-done{background:rgba(255,255,255,0.08);color:var(--cream);box-shadow:none;border:1px solid var(--border2);}
.btn-done.is-missed{background:transparent;color:var(--amber-txt);border:1.5px solid var(--amber);box-shadow:none;}
.btn-skip{background:rgba(255,255,255,0.06);color:var(--cream3);border:1.5px solid var(--border2);border-radius:var(--r);padding:14px 14px;font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;}
.btn-skip:active{opacity:0.7;}
.hero-no-workout{padding:0 16px 14px;font-family:var(--mono);font-size:14px;color:var(--dim);}

/* ── STATS BAR ───────────────────────────────────────── */
.stats-bar{
  display:grid;grid-template-columns:repeat(3,1fr);
  background:rgba(8,26,20,0.85);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(8px);
}
.stat-cell{padding:12px;text-align:center;border-right:1px solid var(--border);}
.stat-cell:last-child{border-right:none;}
.stat-val{font-family:var(--display);font-size:30px;font-weight:900;color:var(--cream);letter-spacing:0.02em;line-height:1;}
.stat-lbl{font-family:var(--mono);font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:0.09em;margin-top:3px;}

/* ── MAIN ──────────────────────────────────────────────── */
.main{padding:14px 12px 100px;}
.app-title{padding:16px 0 2px;display:flex;align-items:baseline;gap:10px;}
.app-name{font-family:var(--display);font-size:44px;font-weight:900;color:var(--cream);text-transform:uppercase;letter-spacing:-0.01em;line-height:1;}
.app-sub{font-family:var(--mono);font-size:13px;color:var(--amber-txt);letter-spacing:0.06em;padding-bottom:2px;}

/* ── LEGEND ────────────────────────────────────────────── */
.legend{display:flex;flex-wrap:wrap;gap:5px;padding:10px 0 8px;}
.leg-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--cream3);text-transform:uppercase;letter-spacing:0.05em;}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* ── PHASE ROW ─────────────────────────────────────────── */
.phase-row{display:flex;align-items:center;gap:10px;margin:28px 0 10px;}
.phase-pill{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;white-space:nowrap;}
.phase-line{flex:1;height:1px;background:var(--border);}
.phase-name{font-family:var(--display);font-size:13px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em;white-space:nowrap;}
.ph-build   .phase-pill{background:#4a2e08; color:#ffc060; border:1px solid rgba(255,180,60,0.4);}
.ph-develop .phase-pill{background:#0a3a40; color:#40e8e0; border:1px solid rgba(60,220,210,0.4);}
.ph-peak    .phase-pill{background:var(--amber); color:var(--bg); font-weight:800;}
.ph-taper   .phase-pill{background:#1a3050; color:#88b8f0; border:1px solid rgba(100,160,240,0.4);}

/* ── WEEK CARD ─────────────────────────────────────────── */
.week-card{
  background: rgba(14,42,34,0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border:1px solid var(--border);
  border-radius:var(--r2);
  margin-bottom:10px;
  overflow:hidden;
  box-shadow: var(--shadow);
  transition: box-shadow 0.2s, border-color 0.2s;
}
.week-card.is-current{border-color:rgba(200,144,58,0.55);box-shadow:var(--shadow-lg),0 0 0 1px rgba(200,144,58,0.2);}
.week-card.has-adj{border-color:rgba(160,180,160,0.3);}
.week-card.has-conflict{border-color:rgba(200,144,58,0.4);}
.week-hdr{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
.week-hdr:active{background:rgba(255,255,255,0.03);}
.week-num-col{flex-shrink:0;width:40px;}
.week-num{font-family:var(--display);font-size:14px;font-weight:800;color:var(--amber-txt);letter-spacing:0.07em;text-transform:uppercase;}
.week-dates{font-family:var(--mono);font-size:10px;color:var(--dim);margin-top:2px;line-height:1.3;}
.week-focus-col{flex:1;min-width:0;}
.week-focus{font-family:var(--display);font-size:18px;font-weight:800;color:var(--cream);text-transform:uppercase;letter-spacing:0.02em;line-height:1.2;}
.current-badge{display:inline-block;font-family:var(--mono);font-size:10px;color:var(--amber-txt);letter-spacing:0.06em;margin-top:4px;}
.week-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.km-pill{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap;letter-spacing:0.03em;}
.km-green{background:rgba(100,200,154,0.12);color:#64c99a;border:1px solid rgba(100,200,154,0.25);}
.km-blue {background:rgba(120,184,240,0.12);color:#7ab8f0;border:1px solid rgba(120,184,240,0.25);}
.km-amber{background:var(--amber);color:var(--bg);font-weight:800;}
.km-red  {background:rgba(224,136,90,0.12);color:#e0885a;border:1px solid rgba(224,136,90,0.25);}
.km-gray {background:rgba(255,255,255,0.06);color:var(--dim);border:1px solid var(--border);}
.week-prog{width:44px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;}
.week-prog-fill{height:100%;background:var(--amber);border-radius:2px;transition:width 0.3s;}
.week-done-txt{font-family:var(--mono);font-size:11px;color:var(--amber-txt);letter-spacing:0.05em;}
.chevron{font-size:18px;color:var(--dim);flex-shrink:0;transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);display:inline-block;line-height:1;}
.chevron.open{transform:rotate(180deg);}

/* ── ACCORDION ─────────────────────────────────────────── */
.week-body{border-top:1px solid var(--border);display:grid;grid-template-rows:0fr;transition:grid-template-rows 0.38s cubic-bezier(0.4,0,0.2,1);}
.week-body.open{grid-template-rows:1fr;}
.week-body-inner{overflow:hidden;}

/* ── DAY ROW ───────────────────────────────────────────── */
.day-row{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;border-bottom:1px solid rgba(120,200,160,0.06);}
.day-row:last-child{border-bottom:none;}
.day-row.is-today{background:rgba(200,144,58,0.08);}
.day-row.is-done{opacity:0.35;}
.day-row.is-done .day-desc{text-decoration:line-through;}
.day-row.is-missed{background:rgba(30,50,40,0.4);}
.day-row.is-rest{opacity:0.45;}
.day-check{
  width:24px;height:24px;
  border:1.5px solid rgba(120,200,160,0.22);
  border-radius:6px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
  -webkit-tap-highlight-color:transparent;
  font-family:var(--mono);font-size:13px;font-weight:700;
  transition:background 0.12s,border-color 0.12s;
  background:rgba(255,255,255,0.03);
}
.day-check.done{background:var(--amber);border-color:var(--amber);color:#fff;}
.day-check.missed{background:rgba(30,50,40,0.5);border-color:rgba(120,200,160,0.2);color:var(--cream3);}
.day-main{flex:1;min-width:0;}
.day-label{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:4px;}
.day-label.is-today-lbl{color:var(--amber-txt);}
.day-desc{font-size:14px;color:var(--cream2);line-height:1.6;}
.day-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}

/* ── TAGS — distinct per category ──────────────────────── */
.tag{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;}
.tag-easy      {background:var(--c-easy-bg);  color:var(--c-easy-fg);}
.tag-long      {background:var(--c-long-bg);  color:var(--c-long-fg);}
.tag-strength  {background:var(--c-str-bg);   color:var(--c-str-fg);}
.tag-tempo     {background:var(--c-tempo-bg); color:var(--c-tempo-fg);}
.tag-intervals {background:var(--c-int-bg);   color:var(--c-int-fg);}
.tag-incline   {background:var(--c-inc-bg);   color:var(--c-inc-fg);}
.tag-night     {background:var(--c-night-bg); color:var(--c-night-fg);}
.tag-back      {background:var(--c-back-bg);  color:var(--c-back-fg);}
.tag-race      {background:var(--c-race-bg);  color:var(--c-race-fg);}
.tag-nutrition {background:var(--c-nut-bg);   color:var(--c-nut-fg);}
.tag-rest      {background:var(--c-rest-bg);  color:var(--c-rest-fg);}

/* ── NOTES ──────────────────────────────────────────────── */
.week-note{
  margin:10px 14px 12px;padding:12px 14px;
  background:rgba(255,255,255,0.03);
  border-radius:var(--r);
  font-size:14px;color:var(--cream3);
  line-height:1.7;
  border-left:2px solid rgba(120,200,160,0.2);
  box-shadow: inset 0 0 0 1px rgba(120,200,160,0.06);
}
.adj-note{
  margin:6px 14px 10px;padding:12px 14px;
  background:rgba(200,144,58,0.05);
  border-radius:var(--r);
  font-size:14px;color:var(--cream2);
  line-height:1.6;
  border-left:2px solid rgba(200,144,58,0.4);
}
.adj-note strong{font-weight:600;color:var(--cream);}

/* ── DRAG HANDLE ─────────────────────────────────────────── */
.drag-handle{width:22px;height:22px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;cursor:grab;color:rgba(255,255,255,0.08);font-size:14px;line-height:1;border-radius:4px;transition:color 0.15s,background 0.15s;touch-action:none;-webkit-tap-highlight-color:transparent;}
.drag-handle:active{cursor:grabbing;}
.week-body-inner:hover .drag-handle,.week-body-inner.reorder-mode .drag-handle{color:var(--cream3);}
.drag-handle:hover{background:rgba(255,255,255,0.06);color:var(--cream);}
.day-row.dragging{opacity:0.3;background:rgba(255,255,255,0.03);}
.day-row.drag-over{border-top:2px solid var(--amber);margin-top:-1px;}

/* ── REORDER BTN ─────────────────────────────────────────── */
.reorder-btn{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);cursor:pointer;margin:10px 14px 2px;display:inline-flex;align-items:center;gap:5px;transition:background 0.15s,color 0.15s,border-color 0.15s;}
.reorder-btn:hover{background:rgba(255,255,255,0.05);color:var(--cream2);border-color:var(--border2);}
.reorder-btn.active{background:rgba(200,144,58,0.1);color:var(--amber-txt);border-color:rgba(200,144,58,0.4);}

/* ── CONFLICT ────────────────────────────────────────────── */
.conflict-badge{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:2px 8px;border-radius:20px;background:rgba(200,144,58,0.1);color:var(--amber-txt);border:1px solid rgba(200,144,58,0.3);white-space:nowrap;}
.day-conflict-warn{font-family:var(--mono);font-size:11px;color:var(--amber-txt);margin-top:5px;display:flex;align-items:center;gap:4px;}
</style>
</head>
<body>

<div class="hero" id="hero"></div>

<div class="stats-bar">
  <div class="stat-cell"><div class="stat-val" id="s-km">0</div><div class="stat-lbl">km done</div></div>
  <div class="stat-cell"><div class="stat-val" id="s-sessions">0</div><div class="stat-lbl">sessions</div></div>
  <div class="stat-cell"><div class="stat-val" id="s-missed">0</div><div class="stat-lbl">missed</div></div>
</div>

<div class="main">
  <div class="app-title">
    <div class="app-name">Mossarun</div>
    <div class="app-sub">24H · Sep 4</div>
  </div>

  <div class="legend">
    <span class="leg-item"><span class="leg-dot" style="background:var(--c-easy-bg);outline:1px solid var(--c-easy-fg)44"></span>Easy</span>
    <span class="leg-item"><span class="leg-dot" style="background:var(--c-long-bg);outline:1px solid var(--c-long-fg)44"></span>Long</span>
    <span class="leg-item"><span class="leg-dot" style="background:var(--c-str-bg);outline:1px solid var(--c-str-fg)44"></span>Strength</span>
    <span class="leg-item"><span class="leg-dot" style="background:var(--c-tempo-bg);outline:1px solid var(--c-tempo-fg)44"></span>Tempo</span>
    <span class="leg-item"><span class="leg-dot" style="background:var(--c-int-bg);outline:1px solid var(--c-int-fg)44"></span>Intervals</span>
    <span class="leg-item"><span class="leg-dot" style="background:var(--c-back-bg);outline:1px solid var(--c-back-fg)44"></span>Back-to-back</span>
    <span class="leg-item"><span class="leg-dot" style="background:var(--c-night-bg);outline:1px solid var(--c-night-fg)44"></span>Night sim</span>
    <span class="leg-item"><span class="leg-dot" style="background:var(--c-inc-bg);outline:1px solid var(--c-inc-fg)44"></span>Incline</span>
    <span class="leg-item"><span class="leg-dot" style="background:var(--c-race-bg)"></span>Race</span>
  </div>

  <div id="plan"></div>
</div>

<script>
const STORAGE='mossarun_v6';
const PLAN_START=new Date(2025,5,1);
const TL={easy:'Easy run',long:'Long run',strength:'Strength',tempo:'Tempo',
  rest:'Rest',back:'Back-to-back',race:'Race day',night:'Night sim',
  incline:'Incline',nutrition:'Nutrition',intervals:'Intervals'};

const weeks=[
{ph:1,phLbl:'Phase 1',phCls:'ph-build',phDesc:'Base building',
n:1,dates:'Jun 1–7',focus:'Establish rhythm & habits',kmCls:'km-green',kmLbl:'~46 km',kmVal:46,
days:[
{id:'1-1',dow:0,lbl:'Mon',desc:'Easy run 8 km + Strength A (lower body: squats, lunges, hip thrusts, calf raises). Run outdoors first, strength after.',tags:['easy','strength'],km:8,nut:false},
{id:'1-2',dow:1,lbl:'Tue',desc:'Easy run 10 km at conversational pace. Eat a gel at 45 min — start building your nutrition habit.',tags:['easy'],km:10,nut:true},
{id:'1-3',dow:2,lbl:'Wed',desc:'Strength B — upper + core: rows, press, planks, dead bugs.',tags:['strength'],km:0,nut:false},
{id:'1-4',dow:3,lbl:'Thu',desc:'Incline session (gym/stairs, separate): 30 min at 8–10% incline, easy effort. Practice power hiking posture.',tags:['incline'],km:0,nut:false},
{id:'1-5',dow:4,lbl:'Fri',desc:'Easy run 10 km + Strength C (full body: deadlifts, step-ups, single-leg, loaded carries). Run outdoors first.',tags:['easy','strength'],km:10,nut:true},
{id:'1-6',dow:5,lbl:'Sat',desc:'Rest day. Walk, stretch, foam roll.',tags:['rest'],km:0,rest:true},
{id:'1-7',dow:6,lbl:'Sun',desc:'Long run 18 km easy — eat every 30 min, mix gels and real food. Log what sits well.',tags:['long'],km:18,nut:true},
],note:'Lock in habits: nutrition timing on runs, how combined run+strength days feel, which foods work. Everything this week is information.'},

{ph:1,phLbl:'Phase 1',phCls:'ph-build',phDesc:'Base building',
n:2,dates:'Jun 8–14',focus:'First back-to-back',kmCls:'km-green',kmLbl:'~63 km',kmVal:63,
days:[
{id:'2-1',dow:0,lbl:'Mon',desc:'Easy run 10 km + Strength A. Run outdoors first.',tags:['easy','strength'],km:10,nut:false},
{id:'2-2',dow:1,lbl:'Tue',desc:'Easy run 10 km.',tags:['easy'],km:10,nut:false},

let S={};
try{S=JSON.parse(localStorage.getItem(STORAGE)||'{}');}catch(e){}
const save=()=>{try{localStorage.setItem(STORAGE,JSON.stringify(S));}catch(e){}};
const ds=id=>S[id]||'none';
function cycle(id){const c=ds(id);S[id]=c==='none'?'done':c==='done'?'missed':'none';save();render();}
function markMissed(id){S[id]=ds(id)==='missed'?'none':'missed';save();render();}

function getOrder(week){const o=S['order_'+week.n];if(o&&o.length===week.days.length)return o;return week.days.map((_,i)=>i);}
function saveOrder(week,order){S['order_'+week.n]=order;save();}
function getOrderedDays(week){return getOrder(week).map(i=>week.days[i]);}

function hasStrength(day){return day.tags.includes('strength');}
function getConflicts(week){
  const days=getOrderedDays(week);const conflicts=new Set();
  for(let i=0;i<days.length-1;i++){if(hasStrength(days[i])&&hasStrength(days[i+1])){conflicts.add(days[i].id);conflicts.add(days[i+1].id);}}
  return conflicts;
}

function getPos(){
  const now=new Date();now.setHours(0,0,0,0);
  const start=new Date(PLAN_START);start.setHours(0,0,0,0);
  const diff=Math.floor((now-start)/86400000);
  if(diff<0||diff>=91)return null;
  return{wi:Math.floor(diff/7),dow:diff%7};
}

function getAdj(week){
  const notes=[];const missed=week.days.filter(d=>ds(d.id)==='missed');
  const ms=missed.filter(d=>d.tags.includes('strength')).length;
  const mr=missed.filter(d=>d.km>0&&!d.tags.includes('strength')&&!d.rest);
  const mk=missed.reduce((a,d)=>a+d.km,0);
  if(ms>=2)notes.push('Missed 2+ strength sessions — add 10 min bodyweight (squats, lunges, calf raises) to the end of your next 2 easy runs.');
  else if(ms===1)notes.push('Missed 1 strength session — not critical. Resume next week as normal.');
  mr.forEach(d=>{
    if(d.tags.includes('long')||d.tags.includes('back')){if(d.km>=25)notes.push(`Missed ${d.lbl} (${d.km} km) — shift to next free day if possible, or add 5 km to next week's long run.`);else notes.push(`Missed ${d.lbl} (${d.km} km) — add an easy 8 km on your next rest day if energy allows.`);}
    else if(d.tags.includes('easy'))notes.push(`Missed ${d.lbl} easy run — skip it. Do not double up. Protect the Sunday long run.`);
    else if(d.tags.includes('tempo')||d.tags.includes('intervals'))notes.push(`Missed ${d.lbl} quality session — reschedule within 2 days if possible. If not, drop it and protect Sunday. Never sacrifice the long run for a quality session.`);
    else if(d.tags.includes('night'))notes.push(`Missed ${d.lbl} night simulation — this one matters. Try to fit it in later this week, even a shortened version (10 km at 2–3AM). The experience is the point.`);
    else if(d.tags.includes('incline'))notes.push(`Missed ${d.lbl} incline session — squeeze in 20 min of stair climbing another day if possible.`);
  });
  if(mk>=20&&week.n<11)notes.push(`~${mk} km missed this week. Consider a gentler step-up next week rather than hitting the plan as written.`);
  return notes;
}

function getStats(){let km=0,done=0,missed=0;weeks.forEach(w=>w.days.forEach(d=>{const s=ds(d.id);if(s==='done'){km+=d.km;done++;}if(s==='missed')missed++;}));return{km,done,missed};}

function tg(t){return`<span class="tag tag-${t}">${TL[t]||t}</span>`;}

function renderHero(){
  const hero=document.getElementById('hero');
  const pos=getPos();
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'}).toUpperCase();
  if(!pos){const before=new Date()<PLAN_START;hero.innerHTML=`<div class="hero-top"><div class="hero-eyebrow">${before?'Plan starts Jun 1 2025':'Race completed'}</div><div class="hero-date">${dateStr}</div></div>`;return;}
  const week=weeks[pos.wi];
  const orderedDaysHero=week?getOrderedDays(week):[];
  const day=orderedDaysHero[pos.dow]||null;
  if(!day){hero.innerHTML=`<div class="hero-top"><div class="hero-eyebrow">Today</div><div class="hero-date">${dateStr}</div></div><div class="hero-no-workout">No workout today.</div>`;return;}
  const s=ds(day.id);
  const isDone=s==='done',isMissed=s==='missed',isRest=day.rest||day.tags.includes('rest');
  const btnCls=isDone?'btn-done is-done':isMissed?'btn-done is-missed':'btn-done';
  const btnTxt=isDone?'✓ Done':isMissed?'✕ Missed':'Mark done';
  const vTags=day.tags.filter(t=>t!=='rest');
  const heroLbl=posLabel(week,pos.dow,day);
  hero.innerHTML=`
    <div class="hero-top"><div class="hero-eyebrow">Today's workout</div><div class="hero-date">${dateStr}</div></div>
    <div class="hero-body">
      <div class="hero-pill-row">
        <span class="hero-week-badge">W${week.n} · ${week.dates}</span>
        ${vTags.map(t=>tg(t)).join('')}${day.nut?tg('nutrition'):''}
      </div>
      <div class="hero-title">${heroLbl} — ${vTags.map(t=>TL[t]||t).join(' + ')}</div>
      <div class="hero-desc">${day.desc}</div>
      ${!isRest?`<div class="hero-actions">
        <button class="${btnCls}" onclick="cycle('${day.id}')">${btnTxt}</button>
        <button class="btn-skip" onclick="markMissed('${day.id}')">Skip</button>
      </div>`:''}
    </div>`;
}

function toggleWeek(n){
  S['open_'+n]=!S['open_'+n];save();
  const body=document.getElementById('wb_'+n);
  const chevron=document.getElementById('ch_'+n);
  if(body)body.classList.toggle('open',!!S['open_'+n]);
  if(chevron)chevron.classList.toggle('open',!!S['open_'+n]);
  renderHero();updateStats();
}

function updateStats(){const st=getStats();document.getElementById('s-km').textContent=st.km;document.getElementById('s-sessions').textContent=st.done;document.getElementById('s-missed').textContent=st.missed;}

const DOW_NAMES=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
function posLabel(week,dayIdx,day){if(week.n===13)return day.lbl;return DOW_NAMES[dayIdx]||day.lbl;}

function render(){
  renderHero();updateStats();
  const pos=getPos();const con=document.getElementById('plan');
  let html='',lastPh=0;
  weeks.forEach((week,wi)=>{
    if(week.ph!==lastPh){
      lastPh=week.ph;
      html+=`<div class="phase-row ${week.phCls}">
        <div class="phase-pill">${week.phLbl}</div>
        <div class="phase-line"></div>
        <div class="phase-name">${week.phDesc}</div>
      </div>`;
    }
    const adj=getAdj(week);const hasAdj=adj.length>0;
    const isCurrent=pos&&pos.wi===wi;
    const nonRest=week.days.filter(d=>!d.rest).length;
    const doneCnt=week.days.filter(d=>ds(d.id)==='done').length;
    const prog=nonRest>0?Math.round((doneCnt/nonRest)*100):0;
    const isComplete=doneCnt===nonRest&&nonRest>0;
    const isOpen=(S['open_'+week.n]===undefined&&isCurrent)||!!S['open_'+week.n];
    const conflicts=getConflicts(week);const hasConflict=conflicts.size>0;
    const isReordering=!!S['reorder_'+week.n];
    const orderedDays=getOrderedDays(week);

    html+=`<div class="week-card${isCurrent?' is-current':''}${hasAdj?' has-adj':''}${hasConflict?' has-conflict':''}">
      <div class="week-hdr" onclick="toggleWeek(${week.n})">
        <div class="week-num-col">
          <div class="week-num">W${week.n}</div>
          <div class="week-dates">${week.dates}</div>
        </div>
        <div class="week-focus-col">
          <div class="week-focus">${week.focus}</div>
          ${isCurrent?'<div class="current-badge">▶ CURRENT WEEK</div>':''}
          ${hasConflict?'<div class="current-badge" style="color:var(--amber-txt)">⚠ Adjacent strength days</div>':''}
        </div>
        <div class="week-right">
          <span class="km-pill ${week.kmCls}">${week.kmLbl}</span>
          ${isComplete?'<div class="week-done-txt">✓ DONE</div>':`<div class="week-prog"><div class="week-prog-fill" style="width:${prog}%"></div></div>`}
        </div>
        <div class="chevron${isOpen?' open':''}" id="ch_${week.n}">▾</div>
      </div>
      <div class="week-body${isOpen?' open':''}" id="wb_${week.n}">
        <div class="week-body-inner${isReordering?' reorder-mode':''}" id="wbi_${week.n}">
          <button class="reorder-btn${isReordering?' active':''}" onclick="event.stopPropagation();toggleReorder(${week.n})">${isReordering?'✓ Done reordering':'⇅ Reorder sessions'}</button>`;

    orderedDays.forEach((day,dayIdx)=>{
      const s=ds(day.id);
      const isToday=pos&&pos.wi===wi&&pos.dow===dayIdx;
      const isConflict=conflicts.has(day.id);
      const rowCls=[isToday?'is-today':'',s==='done'?'is-done':'',s==='missed'?'is-missed':'',day.rest?'is-rest':''].filter(Boolean).join(' ');
      const checkCls=s==='done'?'done':s==='missed'?'missed':'';
      const checkChar=s==='done'?'✓':s==='missed'?'✕':'';
      const vTags=day.tags.filter(t=>t!=='rest');
      const tagsHtml=vTags.map(t=>tg(t)).join('')+(day.nut?tg('nutrition'):'');
      const displayLbl=posLabel(week,dayIdx,day);
      html+=`<div class="day-row ${rowCls}" data-week="${week.n}" data-idx="${dayIdx}" draggable="${isReordering?'true':'false'}">
        ${isReordering?`<div class="drag-handle" title="Drag to reorder">⠿</div>`:''}
        <div class="day-check ${checkCls}" onclick="cycle('${day.id}')">${checkChar}</div>
        <div class="day-main">
          <div class="day-label${isToday?' is-today-lbl':''}">${displayLbl}${isToday?' · TODAY':''}</div>
          <div class="day-desc">${day.desc}</div>
          ${tagsHtml?`<div class="day-tags">${tagsHtml}</div>`:''}
          ${isConflict?`<div class="day-conflict-warn">⚠ Strength day adjacent to another — consider reordering</div>`:''}
        </div>
      </div>`;
    });

    if(week.note)html+=`<div class="week-note">${week.note}</div>`;
    adj.forEach(a=>html+=`<div class="adj-note"><strong>Adjustment:</strong> ${a}</div>`);
    html+=`</div></div></div>`;
  });
  con.innerHTML=html;
  initDrag();
}

function toggleReorder(n){S['reorder_'+n]=!S['reorder_'+n];save();render();}

function initDrag(){
  let dragSrcWeek=null,dragSrcIdx=null,dragEl=null;
  document.querySelectorAll('.day-row[draggable="true"]').forEach(row=>{
    row.addEventListener('dragstart',e=>{dragSrcWeek=+row.dataset.week;dragSrcIdx=+row.dataset.idx;dragEl=row;setTimeout(()=>row.classList.add('dragging'),0);e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging');document.querySelectorAll('.day-row').forEach(r=>r.classList.remove('drag-over'));});
    row.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';document.querySelectorAll('.day-row').forEach(r=>r.classList.remove('drag-over'));if(row!==dragEl)row.classList.add('drag-over');});
    row.addEventListener('drop',e=>{
      e.preventDefault();const targetIdx=+row.dataset.idx;const targetWeek=+row.dataset.week;
      if(dragSrcWeek!==targetWeek||dragSrcIdx===targetIdx)return;
      const week=weeks.find(w=>w.n===dragSrcWeek);if(!week)return;
      const order=getOrder(week);const newOrder=[...order];const [moved]=newOrder.splice(dragSrcIdx,1);newOrder.splice(targetIdx,0,moved);saveOrder(week,newOrder);render();
    });
    let touchStartY=0,touchStartIdx=null,touchWeek=null;
    row.addEventListener('touchstart',e=>{if(!row.closest('.reorder-mode'))return;touchStartY=e.touches[0].clientY;touchStartIdx=+row.dataset.idx;touchWeek=+row.dataset.week;row.classList.add('dragging');},{passive:true});
    row.addEventListener('touchmove',e=>{
      if(touchStartIdx===null)return;e.preventDefault();const y=e.touches[0].clientY;
      const els=document.querySelectorAll(`[data-week="${touchWeek}"]`);let closest=null,closestDist=Infinity;
      els.forEach(el=>{const rect=el.getBoundingClientRect();const mid=rect.top+rect.height/2;const dist=Math.abs(y-mid);if(dist<closestDist&&+el.dataset.idx!==touchStartIdx){closestDist=dist;closest=el;}});
      document.querySelectorAll('.day-row').forEach(r=>r.classList.remove('drag-over'));if(closest)closest.classList.add('drag-over');
    },{passive:false});
    row.addEventListener('touchend',e=>{
      if(touchStartIdx===null)return;row.classList.remove('dragging');
      const overEl=document.querySelector('.day-row.drag-over');
      if(overEl&&+overEl.dataset.week===touchWeek){const targetIdx=+overEl.dataset.idx;const week=weeks.find(w=>w.n===touchWeek);if(week){const order=getOrder(week);const newOrder=[...order];const [moved]=newOrder.splice(touchStartIdx,1);newOrder.splice(targetIdx,0,moved);saveOrder(week,newOrder);}}
      touchStartIdx=null;document.querySelectorAll('.day-row').forEach(r=>r.classList.remove('drag-over'));render();
    });
  });
}

render();
</script>
</body>
</html>
