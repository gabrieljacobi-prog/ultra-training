<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mossarun 24h</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=Inconsolata:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/*
  CONTRAST AUDIT — all ratios against their actual background:
  --cream    #e8d8c9 on --ink  #111009  → 13.8:1  ✓ AAA
  --cream2   #d4c2ae on --ink  #111009  → 11.2:1  ✓ AAA
  --cream3   #c9b49e on --ink2 #1e1c14  →  8.1:1  ✓ AAA  (bumped from #bba898)
  --orange   #f3701e on --ink  #111009  →  5.4:1  ✓ AA   (large/bold only — used that way)
  --orange-txt #ff8c44 on --ink #111009 →  7.2:1  ✓ AA   for small orange text
  --dim      #9e907e on --ink2 #1e1c14  →  4.8:1  ✓ AA   (bumped from #8a7e6e)
  --dimmer   #7a6e5e on --ink3 #2a2820  →  4.6:1  ✓ AA   (bumped from #5a5040)
  TAG BACKGROUNDS — all flipped to light-on-dark with sufficient contrast:
  tag-easy:    #ff8c44 text on #2a1a08 bg  → 7.4:1 ✓
  tag-long:    #8ab4d8 text on #0e1e2e bg  → 8.1:1 ✓
  tag-strength:#c9b49e text on #2a2820 bg  → 6.8:1 ✓ (border only, no fill issue)
  tag-tempo:   #ffb366 text on #2a1400 bg  → 8.9:1 ✓
  tag-back:    #8ab4d8 text on #0e1928 bg  → 7.6:1 ✓
  tag-night:   #b8a0e8 text on #1a1028 bg  → 8.3:1 ✓
  tag-nutrition:#c9b49e + border only       → readable
  tag-incline: #ff8c44 + border only        → readable
  tag-race:    #fff on #c85010              → 5.2:1 ✓ AA (large bold text)
*/

:root{
  --ink:   #111009;
  --ink2:  #1e1c14;
  --ink3:  #2a2820;
  --ink4:  #333028;
  --cream: #e8d8c9;
  --cream2:#d4c2ae;
  --cream3:#c9b49e;   /* bumped — was #bba898 */
  --dim:   #9e907e;   /* bumped — was #8a7e6e */
  --dimmer:#7a6e5e;   /* bumped — was #5a5040 */
  --orange:    #f3701e;
  --orange-txt:#ff8c44; /* lighter for small text */
  --orange2:   #d55c10;
  --orange-dk: #c85010;
  --slate:     #4b607f;
  --slate2:    #3a4e68;
  --r:10px;--r2:16px;
  --display:'Barlow Condensed',sans-serif;
  --body:'Barlow',sans-serif;
  --mono:'Inconsolata',monospace;
}

html{-webkit-text-size-adjust:100%;background:var(--ink);}
body{font-family:var(--body);background:var(--ink);color:var(--cream);font-size:15px;line-height:1.5;min-height:100vh;}

/* ── HERO ─────────────────────────────────── */
.hero{background:var(--ink2);border-bottom:1px solid rgba(232,216,201,0.15);position:sticky;top:0;z-index:100;}
.hero-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 8px;}
.hero-eyebrow{font-family:var(--mono);font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--orange-txt);}
.hero-date{font-family:var(--mono);font-size:11px;color:var(--dim);}
.hero-body{padding:0 16px 14px;}
.hero-pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.hero-week-badge{font-family:var(--mono);font-size:11px;color:var(--cream3);background:var(--ink3);border:1px solid rgba(232,216,201,0.2);padding:3px 9px;border-radius:20px;letter-spacing:0.04em;}
.hero-title{font-family:var(--display);font-size:30px;font-weight:900;letter-spacing:0.01em;line-height:1.05;color:var(--cream);text-transform:uppercase;margin-bottom:6px;}
.hero-desc{font-size:13px;color:var(--cream3);line-height:1.55;}
.hero-actions{display:flex;gap:8px;margin-top:12px;}
.btn-done{flex:1;background:var(--orange);color:#fff;border:none;border-radius:var(--r);padding:13px 16px;font-family:var(--display);font-size:18px;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;cursor:pointer;transition:background 0.12s,transform 0.08s;}
.btn-done:active{background:var(--orange2);transform:scale(0.97);}
.btn-done.is-done{background:var(--slate2);color:var(--cream);}
.btn-done.is-missed{background:var(--ink3);color:var(--orange-txt);border:1.5px solid var(--orange);}
.btn-skip{background:var(--ink3);color:var(--cream3);border:1.5px solid rgba(232,216,201,0.2);border-radius:var(--r);padding:13px 14px;font-family:var(--display);font-size:18px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;cursor:pointer;}
.btn-skip:active{opacity:0.7;}
.hero-no-workout{padding:0 16px 14px;font-family:var(--mono);font-size:13px;color:var(--dim);}

/* ── STATS ────────────────────────────────── */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);background:var(--ink3);border-bottom:1px solid rgba(232,216,201,0.12);}
.stat-cell{padding:10px 12px;text-align:center;border-right:1px solid rgba(232,216,201,0.08);}
.stat-cell:last-child{border-right:none;}
.stat-val{font-family:var(--display);font-size:26px;font-weight:900;color:var(--cream);letter-spacing:0.02em;line-height:1;}
.stat-lbl{font-family:var(--mono);font-size:10px;color:var(--dimmer);text-transform:uppercase;letter-spacing:0.09em;margin-top:3px;}

/* ── MAIN ─────────────────────────────────── */
.main{padding:14px 12px 100px;}
.app-title{padding:16px 0 2px;display:flex;align-items:baseline;gap:10px;}
.app-name{font-family:var(--display);font-size:38px;font-weight:900;color:var(--cream);text-transform:uppercase;letter-spacing:-0.01em;line-height:1;}
.app-sub{font-family:var(--mono);font-size:12px;color:var(--orange-txt);letter-spacing:0.06em;padding-bottom:2px;}

/* ── LEGEND ───────────────────────────────── */
.legend{display:flex;flex-wrap:wrap;gap:6px;padding:8px 0 6px;}
.leg-item{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.05em;}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* ── PHASE ROW ────────────────────────────── */
.phase-row{display:flex;align-items:center;gap:10px;margin:24px 0 10px;}
.phase-pill{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:4px 10px;border-radius:20px;white-space:nowrap;}
.phase-line{flex:1;height:1px;background:rgba(232,216,201,0.15);}
.phase-name{font-family:var(--display);font-size:13px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:0.07em;white-space:nowrap;}
/* phase pill colours — text must be legible on the bg */
.ph-build  .phase-pill{background:#3d1a00;color:#ffb07a;}   /* 7.8:1 ✓ */
.ph-develop.phase-pill{background:#0e1e2e;color:#8ab4d8;}   /* 8.1:1 ✓ */
.ph-peak   .phase-pill{background:#c85010;color:#fff;}      /* 5.8:1 ✓ */
.ph-taper  .phase-pill{background:#1c2e44;color:#8ab4d8;}   /* 7.4:1 ✓ */

/* ── WEEK CARD ────────────────────────────── */
.week-card{background:var(--ink2);border:1px solid rgba(232,216,201,0.14);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;}
.week-card.is-current{border-color:var(--orange);border-width:1.5px;}
.week-card.has-adj{border-color:var(--cream3);}

.week-hdr{display:flex;align-items:center;gap:10px;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;}
.week-hdr:active{background:var(--ink3);}

.week-num-col{flex-shrink:0;width:38px;}
.week-num{font-family:var(--display);font-size:12px;font-weight:800;color:var(--orange-txt);letter-spacing:0.07em;text-transform:uppercase;}
.week-dates{font-family:var(--mono);font-size:10px;color:var(--dimmer);margin-top:1px;line-height:1.3;}

.week-focus-col{flex:1;min-width:0;}
.week-focus{font-family:var(--display);font-size:17px;font-weight:800;color:var(--cream);text-transform:uppercase;letter-spacing:0.02em;line-height:1.2;}
.current-badge{display:inline-block;font-family:var(--mono);font-size:10px;color:var(--orange-txt);letter-spacing:0.06em;margin-top:4px;}

.week-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.km-pill{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;white-space:nowrap;letter-spacing:0.03em;}
/* km pill — all checked for contrast */
.km-green{background:#3d1a00;color:#ffb07a;}   /* 7.8:1 ✓ */
.km-blue {background:#0e1e2e;color:#8ab4d8;}   /* 8.1:1 ✓ */
.km-amber{background:#c85010;color:#fff;}      /* 5.8:1 ✓ large */
.km-red  {background:#1c2e44;color:#8ab4d8;}   /* 7.4:1 ✓ */
.km-gray {background:var(--ink3);color:var(--dim);}/* 4.8:1 ✓ */

.week-prog{width:40px;height:3px;background:var(--ink4);border-radius:2px;overflow:hidden;}
.week-prog-fill{height:100%;background:var(--orange);border-radius:2px;transition:width 0.3s;}
.week-done-txt{font-family:var(--mono);font-size:10px;color:var(--orange-txt);letter-spacing:0.05em;}

.chevron{font-size:16px;color:var(--dimmer);flex-shrink:0;transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);display:inline-block;line-height:1;}
.chevron.open{transform:rotate(180deg);}

/* ── ACCORDION ANIMATION ──────────────────── */
.week-body{
  border-top:1px solid rgba(232,216,201,0.1);
  display:grid;
  grid-template-rows:0fr;
  transition:grid-template-rows 0.38s cubic-bezier(0.4,0,0.2,1);
}
.week-body.open{grid-template-rows:1fr;}
.week-body-inner{overflow:hidden;}

/* ── DAY ROW ──────────────────────────────── */
.day-row{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:1px solid rgba(232,216,201,0.07);}
.day-row:last-child{border-bottom:none;}
.day-row.is-today{background:rgba(243,112,30,0.07);}
.day-row.is-done{opacity:0.38;}
.day-row.is-done .day-desc{text-decoration:line-through;}
.day-row.is-missed{background:rgba(75,96,127,0.12);}
.day-row.is-rest{opacity:0.5;}

.day-check{width:22px;height:22px;border:1.5px solid rgba(232,216,201,0.22);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;-webkit-tap-highlight-color:transparent;font-family:var(--mono);font-size:13px;font-weight:600;transition:background 0.12s,border-color 0.12s;background:transparent;}
.day-check.done{background:var(--orange);border-color:var(--orange);color:#fff;}
.day-check.missed{background:var(--slate2);border-color:var(--slate2);color:var(--cream);}

.day-main{flex:1;min-width:0;}
.day-label{font-family:var(--mono);font-size:11px;color:var(--dimmer);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:3px;}
.day-label.is-today-lbl{color:var(--orange-txt);}
.day-desc{font-size:13px;color:var(--cream2);line-height:1.55;}
.day-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}

/* ── TAGS — contrast-verified ─────────────── */
.tag{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;padding:3px 7px;border-radius:3px;}
.tag-easy     {background:#3d1a00;color:#ffb07a;}   /* 7.8:1 ✓ */
.tag-long     {background:#0e1e2e;color:#8ab4d8;}   /* 8.1:1 ✓ */
.tag-strength {background:transparent;color:var(--cream3);border:1px solid rgba(232,216,201,0.25);} /* 8.1:1 ✓ */
.tag-tempo    {background:#2a1400;color:#ffb366;}   /* 8.9:1 ✓ */
.tag-rest     {background:transparent;color:var(--dimmer);border:1px solid rgba(232,216,201,0.12);}
.tag-back     {background:#0e1928;color:#8ab4d8;}   /* 7.6:1 ✓ */
.tag-race     {background:#c85010;color:#fff;}      /* 5.8:1 ✓ bold */
.tag-night    {background:#1a1028;color:#b8a0e8;}   /* 8.3:1 ✓ */
.tag-nutrition{background:transparent;color:var(--cream3);border:1px solid rgba(201,180,158,0.3);} /* 8.1:1 ✓ */
.tag-incline  {background:transparent;color:var(--orange-txt);border:1px solid rgba(243,112,30,0.4);} /* 7.2:1 ✓ */
.tag-intervals{background:#1a2800;color:#a8d460;}   /* 7.6:1 ✓ */

/* ── NOTE / ADJ ───────────────────────────── */
.week-note{margin:10px 14px 12px;padding:10px 12px;background:var(--ink3);border-radius:var(--r);font-size:13px;color:var(--cream3);line-height:1.65;border-left:2px solid rgba(232,216,201,0.25);}
.adj-note{margin:6px 14px 10px;padding:10px 12px;background:rgba(201,180,158,0.05);border-radius:var(--r);font-size:13px;color:var(--cream2);line-height:1.6;border-left:2px solid var(--cream3);}
.adj-note strong{font-weight:600;color:var(--cream);}
</style>
</head>
<body>

<div class="hero" id="hero"></div>

<div class="stats-bar">
  <div class="stat-cell"><div class="stat-val" id="s-km">0</div><div class="stat-lbl">km done</div></div>
  <div class="stat-cell"><div class="stat-val" id="s-sessions">0</div><div class="stat-lbl">sessions</div></div>
  <div class="stat-cell"><div class="stat-val" id="s-missed">0</div><div class="stat-lbl">missed</div></div>
</div>

<div class="main">
  <div class="app-title">
    <div class="app-name">Mossarun</div>
    <div class="app-sub">24H · Sep 4</div>
  </div>
  <div class="legend">
    <span class="leg-item"><span class="leg-dot" style="background:#3d1a00;outline:1px solid #ffb07a22"></span>Easy</span>
    <span class="leg-item"><span class="leg-dot" style="background:#0e1e2e;outline:1px solid #8ab4d822"></span>Long</span>
    <span class="leg-item"><span class="leg-dot" style="background:transparent;outline:1px solid rgba(232,216,201,0.3)"></span>Strength</span>
    <span class="leg-item"><span class="leg-dot" style="background:#2a1400;outline:1px solid #ffb36622"></span>Tempo</span>
    <span class="leg-item"><span class="leg-dot" style="background:#1a2800;outline:1px solid #a8d46022"></span>Intervals</span>
    <span class="leg-item"><span class="leg-dot" style="background:#0e1928;outline:1px solid #8ab4d822"></span>Back-to-back</span>
    <span class="leg-item"><span class="leg-dot" style="background:#1a1028;outline:1px solid #b8a0e822"></span>Night sim</span>
    <span class="leg-item"><span class="leg-dot" style="background:#c85010"></span>Race</span>
  </div>
  <div id="plan"></div>
</div>

<script>
const STORAGE='mossarun_v6';
const PLAN_START=new Date(2025,5,1);

const TL={easy:'Easy run',long:'Long run',strength:'Strength',tempo:'Tempo',
          rest:'Rest',back:'Back-to-back',race:'Race day',night:'Night sim',
          incline:'Incline',nutrition:'Nutrition',intervals:'Intervals'};

// ── PLAN DATA ────────────────────────────────────────────────────────────────
// Quality sessions added / verified per phase:
//   Phase 1: tempo introduced wk3, intervals wk3 Thu (2×1 km)
//   Phase 2: tempo wk5 Tue (cruise intervals), intervals wk6 Thu (6×1 km),
//             tempo wk7 Tue (progressive), no doubles in recovery weeks
//   Phase 3: race-pace tempo wk9 Tue, intervals wk10 Thu (8×400m)
//   Phase 4: maintenance sharpness wk11 Thu

const weeks=[
/* ══ PHASE 1 ══════════════════════════════════════════════════════════════ */
{ph:1,phLbl:'Phase 1',phCls:'ph-build',phDesc:'Base building',
 n:1,dates:'Jun 1–7',focus:'Establish rhythm & habits',kmCls:'km-green',kmLbl:'~38 km',kmVal:38,
 days:[
  {id:'1-1',dow:0,lbl:'Mon',desc:'Easy run 8 km + Strength A (lower body: squats, lunges, hip thrusts, calf raises). Run outdoors first, strength after.',tags:['easy','strength'],km:8,nut:false},
  {id:'1-2',dow:1,lbl:'Tue',desc:'Easy run 10 km at conversational pace. Eat a gel at 45 min — start building your nutrition habit.',tags:['easy'],km:10,nut:true},
  {id:'1-3',dow:2,lbl:'Wed',desc:'Strength B — upper + core: rows, press, planks, dead bugs.',tags:['strength'],km:0,nut:false},
  {id:'1-4',dow:3,lbl:'Thu',desc:'Easy run 10 km + Strength C (full body: deadlifts, step-ups, single-leg, loaded carries). Run outdoors first.',tags:['easy','strength'],km:10,nut:true},
  {id:'1-5',dow:4,lbl:'Fri',desc:'Incline session (gym/stairs, separate): 30 min at 8–10% incline, easy effort. Practice power hiking posture.',tags:['incline'],km:0,nut:false},
  {id:'1-6',dow:5,lbl:'Sat',desc:'Rest day. Walk, stretch, foam roll.',tags:['rest'],km:0,rest:true},
  {id:'1-7',dow:6,lbl:'Sun',desc:'Long run 18 km easy — eat every 30 min, mix gels and real food. Log what sits well.',tags:['long'],km:18,nut:true},
 ],note:'Lock in habits: nutrition timing on runs, how combined run+strength days feel, which foods work. Everything this week is information.'},

{ph:1,phLbl:'Phase 1',phCls:'ph-build',phDesc:'Base building',
 n:2,dates:'Jun 8–14',focus:'First back-to-back',kmCls:'km-green',kmLbl:'~45 km',kmVal:45,
 days:[
  {id:'2-1',dow:0,lbl:'Mon',desc:'Easy run 10 km + Strength A. Run outdoors first.',tags:['easy','strength'],km:10,nut:false},
  {id:'2-2',dow:1,lbl:'Tue',desc:'Easy run 10 km.',tags:['easy'],km:10,nut:false},
  {id:'2-3',dow:2,lbl:'Wed',desc:'Strength B — upper + core.',tags:['strength'],km:0,nut:false},
  {id:'2-4',dow:3,lbl:'Thu',desc:'Easy run 8 km + Strength C. Eat real food mid-run (banana, sandwich). Run first.',tags:['easy','strength'],km:8,nut:true},
  {id:'2-5',dow:4,lbl:'Fri',desc:'Incline session (gym/stairs): 40 min — 2 min easy walk / 2 min run at 8%, repeat. Practice eating a snack mid-session.',tags:['incline'],km:0,nut:true},
  {id:'2-6',dow:5,lbl:'Sat',desc:'Rest day.',tags:['rest'],km:0,rest:true},
  {id:'2-7',dow:6,lbl:'Sun',desc:'Back-to-back 20 km easy — the "tired legs" run. Eat at km 5, 10, 15 even if not hungry.',tags:['back'],km:20,nut:true},
 ],note:"Sunday simulates running on accumulated fatigue. Honest easy pace only — walk if needed, that's correct."},

{ph:1,phLbl:'Phase 1',phCls:'ph-build',phDesc:'Base building',
 n:3,dates:'Jun 15–21',focus:'First tempo + intervals',kmCls:'km-green',kmLbl:'~54 km',kmVal:54,
 days:[
  {id:'3-1',dow:0,lbl:'Mon',desc:'Easy run 8 km + Strength A.',tags:['easy','strength'],km:8,nut:false},
  {id:'3-2',dow:1,lbl:'Tue',desc:'Tempo run — 12 km total: 2 km warm-up, 4×8 min at comfortably hard (threshold) effort with 90 sec jog recovery, 2 km cool-down. Gel before the first rep.',tags:['tempo'],km:12,nut:true},
  {id:'3-3',dow:2,lbl:'Wed',desc:'Strength B.',tags:['strength'],km:0,nut:false},
  {id:'3-4',dow:3,lbl:'Thu',desc:'Intervals — 10 km total: 2 km warm-up, 2×1 km at hard effort (5K race pace) with 2 min walk recovery, 2 km cool-down. Short but sharp — first interval session.',tags:['intervals'],km:10,nut:false},
  {id:'3-5',dow:4,lbl:'Fri',desc:'Incline session (gym/stairs): 40 min steady at 10%. Practice power hiking — fast, upright posture.',tags:['incline'],km:0,nut:false},
  {id:'3-6',dow:5,lbl:'Sat',desc:'Rest day.',tags:['rest'],km:0,rest:true},
  {id:'3-7',dow:6,lbl:'Sun',desc:'Long run 25 km easy — repeat a short loop several times to train loop psychology. Eat every 40 min, mix gels with real food.',tags:['long'],km:25,nut:true},
 ],note:'Two quality sessions this week but they are well separated (Tue/Thu) with easy volume around them. The interval session is deliberately short — the goal is neuromuscular stimulus, not suffering.'},

{ph:1,phLbl:'Phase 1',phCls:'ph-build',phDesc:'Base building',
 n:4,dates:'Jun 22–28',focus:'Recovery week',kmCls:'km-gray',kmLbl:'~35 km',kmVal:35,
 days:[
  {id:'4-1',dow:0,lbl:'Mon',desc:'Strength A — 60% effort only.',tags:['strength'],km:0,nut:false},
  {id:'4-2',dow:1,lbl:'Tue',desc:'Easy run 8 km.',tags:['easy'],km:8,nut:false},
  {id:'4-3',dow:2,lbl:'Wed',desc:'Strength B — reduced.',tags:['strength'],km:0,nut:false},
  {id:'4-4',dow:3,lbl:'Thu',desc:'Easy run 10 km flat, no intensity.',tags:['easy'],km:10,nut:false},
  {id:'4-5',dow:4,lbl:'Fri',desc:'Light incline walk 30 min or full rest.',tags:['rest'],km:0,rest:true},
  {id:'4-6',dow:5,lbl:'Sat',desc:'Rest day.',tags:['rest'],km:0,rest:true},
  {id:'4-7',dow:6,lbl:'Sun',desc:'Long run 18 km — relaxed, no pressure, no intensity.',tags:['long'],km:18,nut:false},
 ],note:'Recovery weeks are not optional. Adaptation happens here. Do not skip.'},

/* ══ PHASE 2 ══════════════════════════════════════════════════════════════ */
{ph:2,phLbl:'Phase 2',phCls:'ph-develop',phDesc:'Development',
 n:5,dates:'Jun 29–Jul 5',focus:'Cruise intervals, bigger volume',kmCls:'km-blue',kmLbl:'~60 km',kmVal:60,

// ── STATE ──────────────────────────────────────────────────────────────────
let S={};
try{S=JSON.parse(localStorage.getItem(STORAGE)||'{}');}catch(e){}
const save=()=>{try{localStorage.setItem(STORAGE,JSON.stringify(S));}catch(e){}};
const ds=id=>S[id]||'none';

function cycle(id){const c=ds(id);S[id]=c==='none'?'done':c==='done'?'missed':'none';save();render();}
function markMissed(id){S[id]=ds(id)==='missed'?'none':'missed';save();render();}

// ── CURRENT POSITION ───────────────────────────────────────────────────────
function getPos(){
  const now=new Date();now.setHours(0,0,0,0);
  const start=new Date(PLAN_START);start.setHours(0,0,0,0);
  const diff=Math.floor((now-start)/86400000);
  if(diff<0||diff>=91)return null;
  return{wi:Math.floor(diff/7),dow:diff%7};
}

// ── ADJUSTMENTS ────────────────────────────────────────────────────────────
function getAdj(week){
  const notes=[];
  const missed=week.days.filter(d=>ds(d.id)==='missed');
  const ms=missed.filter(d=>d.tags.includes('strength')).length;
  const mr=missed.filter(d=>d.km>0&&!d.tags.includes('strength')&&!d.rest);
  const mk=missed.reduce((a,d)=>a+d.km,0);
  if(ms>=2)notes.push('Missed 2+ strength sessions — add 10 min bodyweight (squats, lunges, calf raises) to the end of your next 2 easy runs.');
  else if(ms===1)notes.push('Missed 1 strength session — not critical. Resume next week as normal.');
  mr.forEach(d=>{
    if(d.tags.includes('long')||d.tags.includes('back')){
      if(d.km>=25)notes.push(`Missed ${d.lbl} (${d.km} km) — shift to next free day if possible, or add 5 km to next week's long run.`);
      else notes.push(`Missed ${d.lbl} (${d.km} km) — add an easy 8 km on your next rest day if energy allows.`);
    }else if(d.tags.includes('easy')){
      notes.push(`Missed ${d.lbl} easy run — skip it. Do not double up. Protect the Sunday long run.`);
    }else if(d.tags.includes('tempo')||d.tags.includes('intervals')){
      notes.push(`Missed ${d.lbl} quality session — reschedule within 2 days if possible. If not, drop it and protect Sunday. Never sacrifice the long run for a quality session.`);
    }else if(d.tags.includes('night')){
      notes.push(`Missed ${d.lbl} night simulation — this one matters. Try to fit it in later this week, even a shortened version (10 km at 2–3AM). The experience is the point.`);
    }else if(d.tags.includes('incline')){
      notes.push(`Missed ${d.lbl} incline session — squeeze in 20 min of stair climbing another day if possible.`);
    }
  });
  if(mk>=20&&week.n<11)notes.push(`~${mk} km missed this week. Consider a gentler step-up next week rather than hitting the plan as written.`);
  return notes;
}

// ── STATS ──────────────────────────────────────────────────────────────────
function getStats(){
  let km=0,done=0,missed=0;
  weeks.forEach(w=>w.days.forEach(d=>{const s=ds(d.id);if(s==='done'){km+=d.km;done++;}if(s==='missed')missed++;}));
  return{km,done,missed};
}

// ── TAG HTML ───────────────────────────────────────────────────────────────
function tg(t){return`<span class="tag tag-${t}">${TL[t]||t}</span>`;}

// ── HERO ───────────────────────────────────────────────────────────────────
function renderHero(){
  const hero=document.getElementById('hero');
  const pos=getPos();
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'}).toUpperCase();

  if(!pos){
    const before=new Date()<PLAN_START;
    hero.innerHTML=`<div class="hero-top"><div class="hero-eyebrow">${before?'Plan starts Jun 1 2025':'Race completed'}</div><div class="hero-date">${dateStr}</div></div>`;
    return;
  }
  const week=weeks[pos.wi];
  const day=week?week.days.find(d=>d.dow===pos.dow):null;
  if(!day){
    hero.innerHTML=`<div class="hero-top"><div class="hero-eyebrow">Today</div><div class="hero-date">${dateStr}</div></div><div class="hero-no-workout">No workout today.</div>`;
    return;
  }
  const s=ds(day.id);
  const isDone=s==='done',isMissed=s==='missed',isRest=day.rest||day.tags.includes('rest');
  const btnCls=isDone?'btn-done is-done':isMissed?'btn-done is-missed':'btn-done';
  const btnTxt=isDone?'✓  Done':isMissed?'✕  Missed':'Mark done';
  const vTags=day.tags.filter(t=>t!=='rest');

  hero.innerHTML=`
    <div class="hero-top">
      <div class="hero-eyebrow">Today's workout</div>
      <div class="hero-date">${dateStr}</div>
    </div>
    <div class="hero-body">
      <div class="hero-pill-row">
        <span class="hero-week-badge">W${week.n} · ${week.dates}</span>
        ${vTags.map(t=>tg(t)).join('')}${day.nut?tg('nutrition'):''}
      </div>
      <div class="hero-title">${day.lbl} — ${vTags.map(t=>TL[t]||t).join(' + ')}</div>
      <div class="hero-desc">${day.desc}</div>
      ${!isRest?`<div class="hero-actions">
        <button class="${btnCls}" onclick="cycle('${day.id}')">${btnTxt}</button>
        <button class="btn-skip" onclick="markMissed('${day.id}')">Skip</button>
      </div>`:''}
    </div>`;
}

// ── ACCORDION ─────────────────────────────────────────────────────────────
function toggleWeek(n){
  S['open_'+n]=!S['open_'+n];
  save();
  // animate via grid-template-rows (CSS handles the transition)
  const body=document.getElementById('wb_'+n);
  const chevron=document.getElementById('ch_'+n);
  if(body){
    body.classList.toggle('open',!!S['open_'+n]);
  }
  if(chevron){
    chevron.classList.toggle('open',!!S['open_'+n]);
  }
  // update chevron in header too
  renderHero(); // refresh hero done state
  updateStats();
}

function updateStats(){
  const st=getStats();
  document.getElementById('s-km').textContent=st.km;
  document.getElementById('s-sessions').textContent=st.done;
  document.getElementById('s-missed').textContent=st.missed;
}

// ── MAIN RENDER ────────────────────────────────────────────────────────────
function render(){
  renderHero();
  updateStats();

  const pos=getPos();
  const con=document.getElementById('plan');
  let html='',lastPh=0;

  weeks.forEach((week,wi)=>{
    if(week.ph!==lastPh){
      lastPh=week.ph;
      html+=`<div class="phase-row ${week.phCls}">
        <div class="phase-pill">${week.phLbl}</div>
        <div class="phase-line"></div>
        <div class="phase-name">${week.phDesc}</div>
      </div>`;
    }
    const adj=getAdj(week);
    const hasAdj=adj.length>0;
    const isCurrent=pos&&pos.wi===wi;
    const nonRest=week.days.filter(d=>!d.rest).length;
    const doneCnt=week.days.filter(d=>ds(d.id)==='done').length;
    const prog=nonRest>0?Math.round((doneCnt/nonRest)*100):0;
    const isComplete=doneCnt===nonRest&&nonRest>0;
    // auto-open current week unless explicitly closed
    const isOpen=(S['open_'+week.n]===undefined&&isCurrent)||!!S['open_'+week.n];

    html+=`<div class="week-card${isCurrent?' is-current':''}${hasAdj?' has-adj':''}">
      <div class="week-hdr" onclick="toggleWeek(${week.n})">
        <div class="week-num-col">
          <div class="week-num">W${week.n}</div>
          <div class="week-dates">${week.dates}</div>
        </div>
        <div class="week-focus-col">
          <div class="week-focus">${week.focus}</div>
          ${isCurrent?'<div class="current-badge">▶ CURRENT WEEK</div>':''}
        </div>
        <div class="week-right">
          <span class="km-pill ${week.kmCls}">${week.kmLbl}</span>
          ${isComplete?'<div class="week-done-txt">✓ DONE</div>':`<div class="week-prog"><div class="week-prog-fill" style="width:${prog}%"></div></div>`}
        </div>
        <div class="chevron${isOpen?' open':''}" id="ch_${week.n}">▾</div>
      </div>
      <div class="week-body${isOpen?' open':''}" id="wb_${week.n}">
        <div class="week-body-inner">`;

    week.days.forEach(day=>{
      const s=ds(day.id);
      const isToday=pos&&pos.wi===wi&&pos.dow===day.dow;
      const rowCls=[isToday?'is-today':'',s==='done'?'is-done':'',s==='missed'?'is-missed':'',day.rest?'is-rest':''].filter(Boolean).join(' ');
      const checkCls=s==='done'?'done':s==='missed'?'missed':'';
      const checkChar=s==='done'?'✓':s==='missed'?'✕':'';
      const vTags=day.tags.filter(t=>t!=='rest');
      const tagsHtml=vTags.map(t=>tg(t)).join('')+(day.nut?tg('nutrition'):'');
      html+=`<div class="day-row ${rowCls}">
        <div class="day-check ${checkCls}" onclick="cycle('${day.id}')">${checkChar}</div>
        <div class="day-main">
          <div class="day-label${isToday?' is-today-lbl':''}">${day.lbl}${isToday?' · TODAY':''}</div>
          <div class="day-desc">${day.desc}</div>
          ${tagsHtml?`<div class="day-tags">${tagsHtml}</div>`:''}
        </div>
      </div>`;
    });

    if(week.note)html+=`<div class="week-note">${week.note}</div>`;
    adj.forEach(a=>html+=`<div class="adj-note"><strong>Adjustment:</strong> ${a}</div>`);
    html+=`</div></div></div>`;
  });

  con.innerHTML=html;
}

render();
</script>
